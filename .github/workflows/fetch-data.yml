name: Fetch Bitrix Data

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 09:00 Moscow
  workflow_dispatch:        # Manual trigger button in GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch data from Bitrix24
        env:
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
        run: python scripts/fetch_bitrix.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json
          git diff --staged --quiet || git commit -m "chore: update dashboard data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
